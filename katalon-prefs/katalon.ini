-startup
plugins/org.eclipse.equinox.launcher_1.7.100.v20251111-0406.jar
--launcher.library
plugins/org.eclipse.equinox.launcher.gtk.linux.x86_64_1.2.1500.v20250801-0854
-data
@noDefault
-eclipse.keyring
@user.home/.katalon/secure_storage/katalon.keyring
-vmargs
-XX:CompileCommand=quiet
-XX:CompileCommand=exclude org.eclipse.jdt.internal.core.dom.rewrite.ASTRewriteAnalyzer::getExtendedRange
-XX:+UseG1GC
-XX:+UseStringDeduplication
-Xms256m
-Dfile.encoding=utf-8
--add-opens=java.base/java.lang=ALL-UNNAMED
--add-opens=java.base/java.util=ALL-UNNAMED
-Dchromium.args=--disable-features=SystemNotifications --disable-gpu --disable-software-rasterizer
-Dchromium.white_bg_color=true
-Dgroovy.antlr4=false
-Xmx2048m
